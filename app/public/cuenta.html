<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Fie — Seleccionar Cuenta</title>
  <link rel="stylesheet" href="assets/css/operaciones.css">
  <style>
    .op-header-icon     { background: rgba(255,165,0,0.12); }
    .op-header-icon svg { stroke: #ffa500; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <div class="top-bar" role="presentation" aria-hidden="true"></div>

  <div class="op-wrapper"
       role="main"
       aria-label="Pantalla de selección de cuenta">

    <!-- Header -->
    <header class="op-header" aria-label="Encabezado de operación">
      <button class="btn-back"
              aria-label="Volver a la pantalla anterior"
              onclick="volver()">←</button>
      <div class="op-header-info">
        <h1 class="op-header-title" id="titulo-pagina">Seleccione cuenta</h1>
        <p class="op-header-sub" id="sub-monto"></p>
      </div>
      <div class="op-header-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"
             fill="none"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round"
             aria-hidden="true"
             focusable="false">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
      </div>
    </header>

    <!-- Label -->
    <div class="section-label"
         id="lbl-cuentas"
         aria-hidden="true"
         style="align-self:flex-start; margin-bottom:12px; animation: fadeDown 0.4s ease both;">
      Cuentas disponibles
    </div>

    <!-- Lista de cuentas -->
    <div style="width:100%; display:flex; flex-direction:column; gap:12px;"
         id="lista-cuentas"
         role="region"
         aria-labelledby="lbl-cuentas"
         aria-live="polite"
         aria-atomic="false">
      <div class="op-msg info visible" role="status" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span id="txt-cargando">Cargando cuentas...</span>
      </div>
    </div>

    <!-- Mensaje error -->
    <div class="op-msg error"
         id="op-msg"
         role="alert"
         aria-live="assertive"
         aria-atomic="true"
         style="margin-top:14px; width:100%;">
      <span aria-hidden="true">●</span>
      <span id="msg-text"></span>
    </div>

  </div>

  <div class="bottom-bar" role="presentation" aria-hidden="true"></div>

  <script src="assets/js/voz.js"></script>
  <script>
    const API     = '/app/api';
    const t       = JSON.parse(sessionStorage.getItem('translations') || '{}');
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    const tipo    = sessionStorage.getItem('op_tipo')  || '';
    const monto   = parseFloat(sessionStorage.getItem('op_monto') || '0');

    if (!usuario.id || !tipo || !monto) window.location.href = 'menu.html';

    // Aplicar idioma
    document.getElementById('titulo-pagina').textContent = t.seleccione_cuenta_titulo || 'Seleccione cuenta';
    document.getElementById('lbl-cuentas').textContent   = t.cuentas_disponibles      || 'Cuentas disponibles';
    document.getElementById('txt-cargando').textContent  = t.cargando_cuentas         || 'Cargando cuentas...';

    // Mostrar tipo y monto en el sub-header
    const tipoLabel = tipo === 'retiro'
      ? (t.retiro   || 'Retiro')
      : (t.deposito || 'Depósito');

    const subTexto = `${tipoLabel} — Bs. ${monto.toFixed(2)}`;
    document.getElementById('sub-monto').textContent = subTexto;

    // ── CARGAR CUENTAS ───────────────────────────────────────
    async function cargarCuentas() {
      try {
        const res  = await fetch(`${API}/balance.php`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');

        const lista = document.getElementById('lista-cuentas');

        if (!data.cuentas || data.cuentas.length === 0) {
          const msgSin = t.sin_cuentas_disp || 'Sin cuentas disponibles';
          lista.innerHTML = `<div class="op-msg info visible" role="status"><span>${msgSin}</span></div>`;
          Voz.hablar(msgSin);
          return;
        }

        lista.innerHTML = data.cuentas.map(c => {
          const esCorriente  = c.tipo === 'corriente';
          const tipoTxt      = esCorriente
            ? (t.cuenta_corriente || 'Cuenta Corriente')
            : (t.cuenta_ahorros   || 'Cuenta Ahorros');
          const insuficiente = tipo === 'retiro' && parseFloat(c.saldo) < monto;
          const ultimosCuatro = c.numero_cuenta.slice(-4);
          const saldoFmt     = parseFloat(c.saldo).toFixed(2);

          // Texto completo para el aria-label del botón
          const ariaBtn = insuficiente
            ? `${tipoTxt}, terminada en ${ultimosCuatro}. Saldo: ${saldoFmt} bolivianos. Fondos insuficientes para esta operación.`
            : `${tipoTxt}, terminada en ${ultimosCuatro}. Saldo disponible: ${saldoFmt} bolivianos. Seleccionar esta cuenta.`;

          return `
            <button
              class="cuenta-item ${c.tipo}"
              aria-label="${ariaBtn}"
              ${insuficiente ? `disabled aria-disabled="true" style="opacity:0.35; cursor:not-allowed;"` : ''}
              onclick="seleccionarCuenta(${c.id}, '${c.tipo}', ${c.saldo})"
            >
              <div class="cuenta-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke-width="2"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                     aria-hidden="true"
                     focusable="false">
                  ${esCorriente
                    ? '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'
                    : '<rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3"/>'}
                </svg>
              </div>
              <div class="cuenta-info" aria-hidden="true">
                <div class="cuenta-tipo">${tipoTxt}</div>
                <div class="cuenta-num">**** **** ${ultimosCuatro}</div>
              </div>
              <div class="cuenta-saldo" aria-hidden="true">
                <div class="cuenta-saldo-monto">Bs. ${saldoFmt}</div>
                <div class="cuenta-saldo-label">${t.saldo_disponible || 'Disponible'}</div>
              </div>
              <div class="cuenta-arrow" aria-hidden="true">›</div>
            </button>
          `;
        }).join('');

        // Voz: anuncia cuántas cuentas hay disponibles
        const total   = data.cuentas.length;
        const aptas   = data.cuentas.filter(c => !(tipo === 'retiro' && parseFloat(c.saldo) < monto)).length;
        const msgVoz  = aptas > 0
          ? `${total === 1 ? 'Una cuenta disponible' : total + ' cuentas disponibles'}. ${aptas === total ? '' : (total - aptas) + ' sin fondos suficientes.'} Seleccione una para continuar.`
          : `${t.sin_cuentas_disp || 'No hay cuentas con fondos suficientes para esta operación.'}`;
        Voz.hablar(msgVoz);

      } catch (err) {
        document.getElementById('lista-cuentas').innerHTML = '';
        document.getElementById('msg-text').textContent = err.message;
        document.getElementById('op-msg').classList.add('visible');
        Voz.hablar(err.message);
      }
    }

    // ── SELECCIONAR CUENTA ───────────────────────────────────
    async function seleccionarCuenta(cuentaId, cuentaTipo, saldo) {
      const endpoint = tipo === 'retiro' ? 'withdraw.php' : 'deposit.php';

      // Deshabilita todos los botones mientras procesa
      const botones = document.querySelectorAll('.cuenta-item');
      botones.forEach(b => {
        b.disabled = true;
        b.setAttribute('aria-disabled', 'true');
      });

      // Anuncia que está procesando
      const msgProcesando = t.procesando || 'Procesando operación, por favor espere.';
      Voz.hablar(msgProcesando);

      try {
        const res  = await fetch(`${API}/${endpoint}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ monto, cuenta_id: cuentaId })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error en la operación');

        sessionStorage.setItem('op_resultado', JSON.stringify({
          tipo,
          monto,
          cuenta_tipo:  cuentaTipo,
          nuevo_saldo:  data.nuevo_saldo,
          mensaje:      data.mensaje
        }));

        Voz.detenerHabla();
        salir('resultado.html');

      } catch (err) {
        document.getElementById('msg-text').textContent = err.message;
        document.getElementById('op-msg').classList.add('visible');
        Voz.hablar(err.message);

        // Rehabilita botones disponibles (no los que tenían fondos insuficientes)
        botones.forEach(b => {
          if (b.style.opacity !== '0.35') {
            b.disabled = false;
            b.removeAttribute('aria-disabled');
          }
        });
      }
    }

    function volver() {
      const dest = tipo === 'retiro' ? 'retiro.html' : 'deposito.html';
      salir(dest);
    }

    function salir(dest) {
      document.querySelector('.op-wrapper').style.transition = 'opacity 0.2s ease';
      document.querySelector('.op-wrapper').style.opacity    = '0';
      setTimeout(() => window.location.href = dest, 200);
    }

    // ── VOZ ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
      Voz.iniciarVozPagina(
        t.seleccione_cuenta_titulo || 'Seleccione una cuenta.',
        `${tipoLabel} de ${monto.toFixed(2)} bolivianos. ${t.cargando_cuentas || 'Cargando cuentas disponibles.'}`
      );
    });

    cargarCuentas();
  </script>
</body>
</html>

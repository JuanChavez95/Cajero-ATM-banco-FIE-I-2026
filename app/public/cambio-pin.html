<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Fie — Cambio de PIN</title>
  <link rel="stylesheet" href="assets/css/operaciones.css">
  <link rel="stylesheet" href="assets/css/pin.css">
  <style>
    .op-header-icon     { background: rgba(255,80,80,0.12); }
    .op-header-icon svg { stroke: #ff5050; }
    body { justify-content: center; }

    .pin-step-card {
      width: 100%; background: #111111;
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 28px 24px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      animation: fadeUp 0.5s 0.1s ease both;
      position: relative; overflow: hidden;
    }
    .pin-step-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #ff5050, #cc0000);
      border-radius: 20px 20px 0 0;
    }

    .paso-indicator { width: 100%; display: flex; align-items: center; margin-bottom: 4px; }
    .paso-step { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .paso-circle { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:800; color:rgba(255,255,255,0.2); transition:all 0.3s; }
    .paso-circle.active { border-color:#ff5050; color:#ff5050; background:rgba(255,80,80,0.1); }
    .paso-circle.done   { border-color:#0094d6; background:#0094d6; color:white; }
    .paso-label { font-size:0.52rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.15); text-align:center; }
    .paso-step.active .paso-label { color:#ff5050; }
    .paso-step.done   .paso-label { color:#0094d6; }
    .paso-line { height:2px; width:36px; background:rgba(255,255,255,0.07); margin-bottom:18px; transition:background 0.3s; flex-shrink:0; }
    .paso-line.done { background:#0094d6; }

    .step-title-pin { font-size:0.68rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.25); }

    .btn-confirm-pin {
      width:100%; padding:16px; border:none; border-radius:12px;
      background:linear-gradient(135deg,#ff5050,#cc0000);
      box-shadow:0 6px 18px rgba(255,80,80,0.3);
      color:white; font-family:'Montserrat',sans-serif;
      font-size:0.78rem; font-weight:800; letter-spacing:3px;
      text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .btn-confirm-pin:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 24px rgba(255,80,80,0.4); }
    .btn-confirm-pin:disabled { background:#1e1e1e; color:rgba(255,255,255,0.15); box-shadow:none; cursor:not-allowed; }

    .success-overlay { position:fixed; inset:0; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.4s ease; }
    .success-overlay.show { opacity:1; pointer-events:all; }
    .success-icon { width:72px; height:72px; border-radius:50%; background:rgba(0,148,214,0.12); border:2px solid #0094d6; display:flex; align-items:center; justify-content:center; animation:popIn 0.4s ease both; }
    .success-icon svg { width:32px; height:32px; }
    .success-name { font-size:1.1rem; font-weight:800; color:#ffffff; animation:fadeUp 0.4s 0.1s ease both; }
    .success-sub  { font-size:0.68rem; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#0094d6; animation:fadeUp 0.4s 0.2s ease both; }
    @keyframes popIn { from{transform:scale(0.6);opacity:0;} to{transform:scale(1);opacity:1;} }
  </style>
</head>
<body>
  <div class="top-bar" role="presentation" aria-hidden="true"></div>

  <!-- Overlay de éxito -->
  <div class="success-overlay"
       id="success-overlay"
       role="alert"
       aria-live="assertive"
       aria-atomic="true">
    <div class="success-icon" aria-hidden="true">
      <svg viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
        <polyline points="6,16 13,23 26,9" stroke="#0094d6" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="success-name" id="success-name">PIN updated</div>
    <div class="success-sub"  id="success-sub">Returning to menu...</div>
  </div>

  <div class="op-wrapper" id="main-wrapper" role="main" aria-label="Pantalla de cambio de PIN">

    <!-- Header -->
    <header class="op-header" aria-label="Encabezado de operación">
      <button class="btn-back"
              aria-label="Retroceder al paso anterior"
              onclick="retroceder()">←</button>
      <div class="op-header-info">
        <h1 class="op-header-title" id="header-titulo">PIN Change</h1>
        <p  class="op-header-sub"   id="sub-paso">Current PIN</p>
      </div>
      <div class="op-header-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true" focusable="false">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
    </header>

    <!-- Indicador de pasos -->
    <div class="paso-indicator"
         role="progressbar"
         aria-valuemin="1"
         aria-valuemax="3"
         aria-valuenow="1"
         aria-valuetext="Paso 1 de 3: PIN actual"
         aria-label="Progreso del cambio de PIN"
         id="paso-indicator">
      <div class="paso-step active" id="ps1">
        <div class="paso-circle active" id="pc1" aria-hidden="true">1</div>
        <div class="paso-label" id="lbl-paso1" aria-hidden="true">Current</div>
      </div>
      <div class="paso-line" id="pl1" aria-hidden="true"></div>
      <div class="paso-step" id="ps2">
        <div class="paso-circle" id="pc2" aria-hidden="true">2</div>
        <div class="paso-label" id="lbl-paso2" aria-hidden="true">New</div>
      </div>
      <div class="paso-line" id="pl2" aria-hidden="true"></div>
      <div class="paso-step" id="ps3">
        <div class="paso-circle" id="pc3" aria-hidden="true">3</div>
        <div class="paso-label" id="lbl-paso3" aria-hidden="true">Confirm</div>
      </div>
    </div>

    <!-- Card PIN -->
    <div class="pin-step-card" role="region" aria-labelledby="step-label">

      <!-- Título del paso actual -->
      <div class="step-title-pin"
           id="step-label"
           role="status"
           aria-live="polite"
           aria-atomic="true">
        Enter your current PIN
      </div>

      <!-- Puntos visuales del PIN -->
      <div class="pin-dots"
           id="pin-dots-status"
           role="status"
           aria-live="polite"
           aria-atomic="true"
           aria-label="PIN ingresado: 0 de 4 dígitos">
        <div class="pin-dot" id="d1" aria-hidden="true"></div>
        <div class="pin-dot" id="d2" aria-hidden="true"></div>
        <div class="pin-dot" id="d3" aria-hidden="true"></div>
        <div class="pin-dot" id="d4" aria-hidden="true"></div>
      </div>

      <!-- Teclado numérico -->
      <div class="numpad"
           role="group"
           aria-label="Teclado numérico para ingresar PIN">
        <button class="num-btn" aria-label="Dígito 1" onclick="presionar('1')">1</button>
        <button class="num-btn" aria-label="Dígito 2" onclick="presionar('2')">2</button>
        <button class="num-btn" aria-label="Dígito 3" onclick="presionar('3')">3</button>
        <button class="num-btn" aria-label="Dígito 4" onclick="presionar('4')">4</button>
        <button class="num-btn" aria-label="Dígito 5" onclick="presionar('5')">5</button>
        <button class="num-btn" aria-label="Dígito 6" onclick="presionar('6')">6</button>
        <button class="num-btn" aria-label="Dígito 7" onclick="presionar('7')">7</button>
        <button class="num-btn" aria-label="Dígito 8" onclick="presionar('8')">8</button>
        <button class="num-btn" aria-label="Dígito 9" onclick="presionar('9')">9</button>
        <button class="num-btn btn-clear"
                aria-label="Borrar último dígito"
                onclick="borrar()">⌫</button>
        <button class="num-btn btn-zero"
                aria-label="Dígito 0"
                onclick="presionar('0')">0</button>
      </div>

      <!-- Mensaje de error -->
      <div class="error-msg hidden"
           id="error-msg"
           role="alert"
           aria-live="assertive"
           aria-atomic="true">
        <span aria-hidden="true">●</span>
        <span id="error-text"></span>
      </div>

      <!-- Botón continuar / confirmar -->
      <button class="btn-confirm-pin"
              id="btn-siguiente"
              disabled
              aria-label="Continuar al siguiente paso"
              aria-disabled="true"
              onclick="avanzar()">
        <span id="btn-text">Continue</span>
      </button>

    </div><!-- /pin-step-card -->

    <!-- Botón cancelar -->
    <button class="btn-back"
            id="btn-cancelar"
            aria-label="Cancelar cambio de PIN y volver al menú"
            style="margin-top:16px; width:auto; padding:0 16px; height:36px;
                   font-size:0.62rem; letter-spacing:2px; text-transform:uppercase;"
            onclick="salir('menu.html')">
      ← Cancel
    </button>

  </div><!-- /main-wrapper -->

  <div class="bottom-bar" role="presentation" aria-hidden="true"></div>

  <script src="assets/js/voz.js"></script>
  <script>
    const API     = '/app/api';
    const t       = JSON.parse(sessionStorage.getItem('translations') || '{}');
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (!usuario.id) window.location.href = 'index.html';

    let paso       = 1;
    let pinActual  = '';
    let pinNuevo   = '';
    let pinConfirm = '';
    let pinBuffer  = '';

    const stepLabels = [
      t.cambiopin_paso1_label || 'Enter your current PIN',
      t.cambiopin_paso2_label || 'Enter your new PIN',
      t.cambiopin_paso3_label || 'Confirm your new PIN'
    ];
    const stepSubs = [
      t.cambiopin_paso1_sub || 'Current PIN',
      t.cambiopin_paso2_sub || 'New PIN',
      t.cambiopin_paso3_sub || 'Confirmation'
    ];
    const stepSteps = [
      t.cambiopin_paso1_step || 'Current',
      t.cambiopin_paso2_step || 'New',
      t.cambiopin_paso3_step || 'Confirm'
    ];

    // Aplicar idioma
    document.getElementById('header-titulo').textContent = t.cambiopin_titulo    || 'PIN Change';
    document.getElementById('lbl-paso1').textContent     = stepSteps[0];
    document.getElementById('lbl-paso2').textContent     = stepSteps[1];
    document.getElementById('lbl-paso3').textContent     = stepSteps[2];
    document.getElementById('success-name').textContent  = t.cambiopin_actualizado || 'PIN updated';
    document.getElementById('success-sub').textContent   = t.cambiopin_volviendo   || 'Returning to menu...';
    document.getElementById('btn-cancelar').textContent  = t.cambiopin_cancelar    || '← Cancel';

    // ── TECLADO ──────────────────────────────────────────────
    function presionar(n) {
      if (pinBuffer.length >= 4) return;
      pinBuffer += n;
      actualizarDots();
      const btn = document.getElementById('btn-siguiente');
      const listo = pinBuffer.length === 4;
      btn.disabled = !listo;
      if (listo) {
        btn.removeAttribute('aria-disabled');
      } else {
        btn.setAttribute('aria-disabled', 'true');
      }
    }

    function borrar() {
      pinBuffer = pinBuffer.slice(0, -1);
      actualizarDots();
      const btn = document.getElementById('btn-siguiente');
      btn.disabled = true;
      btn.setAttribute('aria-disabled', 'true');
      ocultarError();
    }

    function actualizarDots() {
      ['d1','d2','d3','d4'].forEach((id, i) => {
        const d = document.getElementById(id);
        d.classList.toggle('filled', i < pinBuffer.length);
        d.classList.remove('error-dot');
      });
      // Actualiza el anuncio accesible del progreso del PIN
      document.getElementById('pin-dots-status').setAttribute(
        'aria-label',
        `PIN ingresado: ${pinBuffer.length} de 4 dígitos`
      );
    }

    function errorDots(msg) {
      ['d1','d2','d3','d4'].forEach(id => {
        document.getElementById(id).classList.remove('filled');
        document.getElementById(id).classList.add('error-dot');
      });
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-msg').classList.remove('hidden');
      Voz.hablar(msg);
      setTimeout(() => {
        ['d1','d2','d3','d4'].forEach(id =>
          document.getElementById(id).classList.remove('error-dot')
        );
      }, 700);
    }

    function ocultarError() {
      document.getElementById('error-msg').classList.add('hidden');
    }

    // ── AVANZAR ENTRE PASOS ──────────────────────────────────
    function avanzar() {
      if (pinBuffer.length < 4) return;

      if (paso === 1) {
        pinActual = pinBuffer;
        irPasoUI(2);
      } else if (paso === 2) {
        pinNuevo = pinBuffer;
        irPasoUI(3);
      } else if (paso === 3) {
        pinConfirm = pinBuffer;
        if (pinNuevo !== pinConfirm) {
          const msgNoCoinciden = t.cambiopin_no_coinciden || 'New PINs do not match';
          errorDots(msgNoCoinciden);
          pinBuffer = '';
          actualizarDots();
          document.getElementById('btn-siguiente').disabled = true;
          document.getElementById('btn-siguiente').setAttribute('aria-disabled', 'true');
          return;
        }
        enviarCambio();
      }
    }

    // ── ENVIAR CAMBIO ────────────────────────────────────────
    async function enviarCambio() {
      const btn = document.getElementById('btn-siguiente');
      btn.innerHTML = '<span class="spinner" aria-hidden="true"></span>';
      btn.disabled  = true;
      btn.setAttribute('aria-disabled', 'true');
      btn.setAttribute('aria-label', 'Procesando cambio de PIN, por favor espere');
      Voz.hablar(t.procesando || 'Procesando cambio de PIN, por favor espere.');

      try {
        const res = await fetch(`${API}/change_pin.php`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            usuario_id:  usuario.id,
            pin_actual:  pinActual,
            pin_nuevo:   pinNuevo,
            pin_confirm: pinConfirm
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');

        // Muestra el overlay de éxito
        const msgExito = (t.cambiopin_actualizado || 'PIN updated') + '. ' + (t.cambiopin_volviendo || 'Returning to menu.');
        Voz.hablar(msgExito);
        document.getElementById('success-overlay').classList.add('show');
        setTimeout(() => salir('menu.html'), 2500);

      } catch (err) {
        document.getElementById('error-text').textContent = err.message;
        document.getElementById('error-msg').classList.remove('hidden');
        Voz.hablar(err.message);

        const labelBtn = paso === 3
          ? (t.cambiopin_confirmar || 'Confirm change')
          : (t.cambiopin_continuar || 'Continue');
        btn.textContent = labelBtn;
        btn.setAttribute('aria-label', labelBtn);
        btn.disabled    = false;
        btn.removeAttribute('aria-disabled');
        pinBuffer = '';
        actualizarDots();
      }
    }

    // ── NAVEGACIÓN ENTRE PASOS ───────────────────────────────
    function irPasoUI(n) {
      paso      = n;
      pinBuffer = '';
      actualizarDots();
      ocultarError();

      const btn      = document.getElementById('btn-siguiente');
      const labelBtn = n < 3
        ? (t.cambiopin_continuar || 'Continue')
        : (t.cambiopin_confirmar || 'Confirm change');

      btn.disabled    = true;
      btn.setAttribute('aria-disabled', 'true');
      btn.setAttribute('aria-label', labelBtn);
      document.getElementById('btn-text').textContent   = labelBtn;
      document.getElementById('step-label').textContent = stepLabels[n - 1];
      document.getElementById('sub-paso').textContent   = stepSubs[n - 1];

      // Actualiza el progressbar accesible
      const stepTexts = [
        t.cambiopin_paso1_sub || 'PIN actual',
        t.cambiopin_paso2_sub || 'PIN nuevo',
        t.cambiopin_paso3_sub || 'Confirmación'
      ];
      const indicator = document.getElementById('paso-indicator');
      indicator.setAttribute('aria-valuenow', String(n));
      indicator.setAttribute('aria-valuetext', `Paso ${n} de 3: ${stepTexts[n - 1]}`);

      // Actualiza círculos visuales
      [1,2,3].forEach(i => {
        const ps = document.getElementById(`ps${i}`);
        const pc = document.getElementById(`pc${i}`);
        ps.className = 'paso-step' + (i === n ? ' active' : i < n ? ' done' : '');
        pc.className = 'paso-circle' + (i === n ? ' active' : i < n ? ' done' : '');
        pc.innerHTML  = pc.classList.contains('done') ? '✓' : String(i);
        if (i < 3) {
          document.getElementById(`pl${i}`).className = 'paso-line' + (i < n ? ' done' : '');
        }
      });

      // Voz: anuncia el nuevo paso
      Voz.hablar(stepLabels[n - 1]);
    }

    function retroceder() {
      if (paso === 1) salir('menu.html');
      else irPasoUI(paso - 1);
    }

    function salir(dest) {
      Voz.detenerHabla();
      document.getElementById('main-wrapper').style.transition = 'opacity 0.2s ease';
      document.getElementById('main-wrapper').style.opacity    = '0';
      setTimeout(() => window.location.href = dest, 200);
    }

    // ── VOZ ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
      Voz.iniciarVozPagina(
        t.cambiopin_titulo      || 'Cambio de PIN.',
        t.cambiopin_paso1_label || 'Ingrese su PIN actual usando el teclado numérico.'
      );
    });
  </script>
</body>
</html>

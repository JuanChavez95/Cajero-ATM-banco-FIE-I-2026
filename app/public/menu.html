<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Fie — Menú Principal</title>
  <link rel="stylesheet" href="assets/css/menu.css">
</head>
<body>

  <div class="top-bar"></div>

  <div class="menu-wrapper">

    <!-- ── HEADER ── -->
    <div class="menu-header">
      <div class="mini-logo">
        <svg viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="24" fill="#0a0a0a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
          <path d="M20 16 C12 20, 12 36, 20 40" stroke="#e70075" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M28 20 C38 24, 38 32, 28 36" stroke="#0094d6" stroke-width="4" stroke-linecap="round" fill="none"/>
          <circle cx="24" cy="28" r="3" fill="#e70075"/>
        </svg>
        <div class="mini-logo-text">
          <span class="b">Banco</span><span class="f">Fie</span>
        </div>
      </div>
      <div class="menu-clock" id="reloj">--:--:--</div>
    </div>

    <!-- ── TARJETA DE USUARIO ── -->
    <div class="user-card">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0094d6" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="user-info">
        <div class="user-name" id="user-name">Cargando...</div>
        <div class="user-label" id="user-label">Sesión activa</div>
      </div>
      <div class="user-session">
        <div class="session-dot"></div>
        <div class="session-text" id="session-text">En línea</div>
      </div>
    </div>

    <!-- ── TÍTULO ── -->
    <div class="menu-title" id="menu-titulo">Seleccione una operación</div>

    <!-- ── GRID DE OPERACIONES ── -->
    <div class="ops-grid">

      <!-- Retiro -->
      <button class="op-btn retiro" onclick="irA('retiro.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="14" rx="2"/>
            <path d="M16 12H8M12 9l-4 3 4 3"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-retiro">Retiro</div>
          <div class="op-desc" id="op-retiro-desc">Retire efectivo de su cuenta</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

      <!-- Depósito -->
      <button class="op-btn deposito" onclick="irA('deposito.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="14" rx="2"/>
            <path d="M8 12h8M12 9l4 3-4 3"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-deposito">Depósito</div>
          <div class="op-desc" id="op-deposito-desc">Deposite dinero en su cuenta</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

      <!-- Consulta de saldo -->
      <button class="op-btn consulta" onclick="irA('consulta.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-consulta">Consulta de saldo</div>
          <div class="op-desc" id="op-consulta-desc">Vea su saldo disponible</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

      <!-- Transferencia entre mis cuentas -->
      <button class="op-btn transferencia" onclick="irA('transferencia.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M15 7l5 5-5 5"/>
            <path d="M19 12H5M9 17l-5-5 5-5"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-transferencia">Entre mis cuentas</div>
          <div class="op-desc" id="op-transferencia-desc">Transfiera entre sus cuentas</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

      <!-- Transferencia a terceros -->
      <button class="op-btn transferencia" onclick="irA('transferencia-terceros.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-terceros">A terceros</div>
          <div class="op-desc" id="op-terceros-desc">Transfiera a otra cuenta</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

      <!-- Cambio de PIN -->
      <button class="op-btn cambio-pin" onclick="irA('cambio-pin.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-cambio-pin">Cambio de PIN</div>
          <div class="op-desc" id="op-cambio-pin-desc">Actualice su clave de acceso</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

      <!-- Movimientos — ancho completo -->
      <button class="op-btn movimientos full-width" onclick="irA('movimientos.html')">
        <div class="op-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 12h6M9 16h4"/>
          </svg>
        </div>
        <div class="op-text">
          <div class="op-name" id="op-movimientos">Últimos movimientos</div>
          <div class="op-desc" id="op-movimientos-desc">Historial de sus últimas transacciones</div>
        </div>
        <div class="op-arrow">↗</div>
      </button>

    </div><!-- /ops-grid -->

    <!-- ── SALIR ── -->
    <button class="btn-exit" id="btn-salir" onclick="cerrarSesion()">
      ⏻ &nbsp; Terminar sesión
    </button>

  </div><!-- /menu-wrapper -->

  <div class="bottom-bar"></div>

  <script>
    const t       = JSON.parse(sessionStorage.getItem('translations') || '{}');
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');

    if (!usuario || !usuario.id) window.location.href = 'index.html';

    document.getElementById('user-name').textContent  = usuario.nombre || 'Usuario';
    document.getElementById('user-label').textContent = t.sesion_activa || 'Sesión activa';
    document.getElementById('session-text').textContent = t.en_linea || 'En línea';

    // Aplicar idioma
    const ids = {
      'menu-titulo'           : t.menu_titulo        || 'Seleccione una operación',
      'op-retiro'             : t.retiro             || 'Retiro',
      'op-retiro-desc'        : t.retiro_desc        || 'Retire efectivo de su cuenta',
      'op-deposito'           : t.deposito           || 'Depósito',
      'op-deposito-desc'      : t.deposito_desc      || 'Deposite dinero en su cuenta',
      'op-consulta'           : t.consulta_saldo     || 'Consulta de saldo',
      'op-consulta-desc'      : t.consulta_desc      || 'Vea su saldo disponible',
      'op-transferencia'      : t.entre_mis_cuentas  || 'Entre mis cuentas',
      'op-transferencia-desc' : t.transferencia_desc || 'Transfiera entre sus cuentas',
      'op-terceros'           : t.a_terceros         || 'A terceros',
      'op-terceros-desc'      : t.terceros_desc      || 'Transfiera a otra cuenta',
      'op-cambio-pin'         : t.cambio_pin         || 'Cambio de PIN',
      'op-cambio-pin-desc'    : t.cambio_pin_desc    || 'Actualice su clave de acceso',
      'op-movimientos'        : t.movimientos        || 'Últimos movimientos',
      'op-movimientos-desc'   : t.movimientos_desc   || 'Historial de sus últimas transacciones',
    };

    for (const [id, text] of Object.entries(ids)) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    document.getElementById('btn-salir').textContent = '⏻  ' + (t.terminar_sesion || 'Terminar sesión');

    // Reloj
    function actualizarReloj() {
      const ahora = new Date();
      const h = String(ahora.getHours()).padStart(2, '0');
      const m = String(ahora.getMinutes()).padStart(2, '0');
      const s = String(ahora.getSeconds()).padStart(2, '0');
      document.getElementById('reloj').textContent = `${h}:${m}:${s}`;
    }
    actualizarReloj();
    setInterval(actualizarReloj, 1000);

    function irA(pagina) {
      document.querySelector('.menu-wrapper').style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      document.querySelector('.menu-wrapper').style.opacity    = '0';
      document.querySelector('.menu-wrapper').style.transform  = 'translateY(-12px)';
      setTimeout(() => window.location.href = pagina, 250);
    }

    async function cerrarSesion() {
      try { await fetch('/app/api/logout.php', { method: 'POST' }); } catch {}
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    let timerInactividad;
    function reiniciarTimer() {
      clearTimeout(timerInactividad);
      timerInactividad = setTimeout(() => {
        sessionStorage.clear();
        window.location.href = 'index.html';
      }, 2 * 60 * 1000);
    }
    ['click', 'keydown', 'mousemove', 'touchstart'].forEach(ev =>
      document.addEventListener(ev, reiniciarTimer)
    );
    reiniciarTimer();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Juan Carlos Chavez Machaca">
    <title>Calculadora Bootstrap & JQuery</title>

    <!-- IMPORTAR Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- IMPORTAR jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow" style="width: 430px;">

        <h2 class="text-center mb-4">CALCULADORA</h2>

        <div class="mb-3">
            <label class="form-label">Primer número</label>
            <input type="text" class="form-control" id="num1">
        </div>

        <div class="mb-3">
            <label class="form-label">Segundo número</label>
            <input type="text" class="form-control" id="num2">
        </div>

        <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-success" id = "btn-sumar">Sumar</button>
            <button class="btn btn-primary" id = "btn-restar">Restar</button>
            <button class="btn btn-warning" id = "btn-multiplicar">Multiplicar</button>
            <button class="btn btn-danger" id = "btn-dividir">Dividir</button>
        </div>

        <input type="text" class="form-control" id="resultado" readonly>

    </div>
</div>
<script>

function obtenerValores() {
    let n1 = $('#num1').val();
    let n2 = $('#num2').val();
    //Verificar las entradas, deben ser enteros no cadenas de caracteres
    if (isNaN(n1) || isNaN(n2) || n1.trim() === "" || n2.trim() === "") {
        $('#resultado').val("Dato inválido");
        return null;
    }
    return {
        num1: parseInt(n1, 10),
        num2: parseInt(n2, 10)
    };
}

$('#btn-sumar').click(function() {
    let valores = obtenerValores();
    if (valores == null) return;
    $('#resultado').val(valores.num1 + valores.num2);
});

$('#btn-restar').click(function() {
    let valores = obtenerValores();
    if (valores == null) return;
    $('#resultado').val(valores.num1 - valores.num2);
});

$('#btn-multiplicar').click(function() {
    let valores = obtenerValores();
    if (valores == null) return;
    $('#resultado').val(valores.num1 * valores.num2);
});

$('#btn-dividir').click(function() {
    let valores = obtenerValores();
    if (valores == null) return;
    if (valores.num2 === 0) {
        $('#resultado').val("Error en división");
        return;
    }
    $('#resultado').val(valores.num1 / valores.num2);
});

</script>
</body>
</html>

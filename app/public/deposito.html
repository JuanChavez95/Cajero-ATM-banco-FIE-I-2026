<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Fie — Depósito</title>
  <link rel="stylesheet" href="assets/css/operaciones.css">
  <style>
    .op-card::before        { background: linear-gradient(90deg, #0094d6, #006fa6); }
    .monto-btn:hover        { border-color: rgba(0,148,214,0.5); color: #0094d6; }
    .monto-btn.selected     { background: rgba(0,148,214,0.12); border-color: #0094d6; color: #0094d6; }
    .monto-btn.otro:hover   { border-color: rgba(0,148,214,0.4); color: #0094d6; }
    .monto-resumen-valor    { color: #0094d6; }
    .op-header-icon         { background: rgba(0,148,214,0.12); }
    .op-header-icon svg     { stroke: #0094d6; }
    .btn-confirm            { background: linear-gradient(135deg, #0094d6, #006fa6);
                              box-shadow: 0 6px 18px rgba(0,148,214,0.3); }
    .btn-confirm:not(:disabled):hover { box-shadow: 0 10px 24px rgba(0,148,214,0.4); }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <div class="top-bar" role="presentation" aria-hidden="true"></div>

  <div class="op-wrapper"
       role="main"
       aria-label="Pantalla de depósito de dinero">

    <!-- Header -->
    <header class="op-header" aria-label="Encabezado de operación">
      <button class="btn-back"
              aria-label="Volver al menú principal"
              onclick="volver()">←</button>
      <div class="op-header-info">
        <h1 class="op-header-title" id="titulo-pagina">Depósito</h1>
        <p class="op-header-sub" id="sub-pagina">Seleccione el monto</p>
      </div>
      <div class="op-header-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"
             fill="none"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round"
             aria-hidden="true"
             focusable="false">
          <rect x="2" y="6" width="20" height="14" rx="2"/>
          <path d="M8 12h8M12 9l4 3-4 3"/>
        </svg>
      </div>
    </header>

    <!-- Card -->
    <div class="op-card">

      <section aria-label="Montos predefinidos para depósito">
        <div class="section-label" id="lbl-montos" aria-hidden="true">
          Montos disponibles
        </div>
        <div class="montos-grid"
             role="group"
             aria-labelledby="lbl-montos">
          <button class="monto-btn"
                  aria-label="Depositar 10 bolivianos"
                  aria-pressed="false"
                  onclick="elegirMonto(10, this)">
            <span aria-hidden="true">10</span>
            <span class="currency" aria-hidden="true">Bs.</span>
          </button>
          <button class="monto-btn"
                  aria-label="Depositar 20 bolivianos"
                  aria-pressed="false"
                  onclick="elegirMonto(20, this)">
            <span aria-hidden="true">20</span>
            <span class="currency" aria-hidden="true">Bs.</span>
          </button>
          <button class="monto-btn"
                  aria-label="Depositar 50 bolivianos"
                  aria-pressed="false"
                  onclick="elegirMonto(50, this)">
            <span aria-hidden="true">50</span>
            <span class="currency" aria-hidden="true">Bs.</span>
          </button>
          <button class="monto-btn"
                  aria-label="Depositar 100 bolivianos"
                  aria-pressed="false"
                  onclick="elegirMonto(100, this)">
            <span aria-hidden="true">100</span>
            <span class="currency" aria-hidden="true">Bs.</span>
          </button>
          <button class="monto-btn"
                  aria-label="Depositar 200 bolivianos"
                  aria-pressed="false"
                  onclick="elegirMonto(200, this)">
            <span aria-hidden="true">200</span>
            <span class="currency" aria-hidden="true">Bs.</span>
          </button>
          <button class="monto-btn"
                  aria-label="Depositar 500 bolivianos"
                  aria-pressed="false"
                  onclick="elegirMonto(500, this)">
            <span aria-hidden="true">500</span>
            <span class="currency" aria-hidden="true">Bs.</span>
          </button>
          <button class="monto-btn otro"
                  id="btn-otro-monto"
                  aria-label="Ingresar otro monto personalizado"
                  aria-expanded="false"
                  aria-controls="monto-custom"
                  onclick="toggleOtroMonto()">
            ✎ &nbsp; Otro monto
          </button>
        </div>
      </section>

      <!-- Input monto personalizado -->
      <div class="monto-custom"
           id="monto-custom"
           role="region"
           aria-label="Campo para monto personalizado"
           aria-hidden="true">
        <label id="lbl-otro" for="monto-input">
          Ingrese el monto (Bs.)
        </label>
        <div class="monto-input-wrap">
          <span class="monto-prefix" aria-hidden="true">Bs.</span>
          <input
            type="number"
            class="monto-input"
            id="monto-input"
            min="1"
            step="0.01"
            placeholder="0.00"
            aria-label="Monto personalizado en bolivianos"
            aria-describedby="monto-hint"
            oninput="actualizarDesdeInput()"
          >
        </div>
        <span id="monto-hint" class="sr-only">
          Ingrese el monto en bolivianos que desea depositar. Solo números.
        </span>
      </div>

      <div class="op-divider" role="separator" aria-hidden="true"></div>

      <!-- Resumen del monto elegido -->
      <div class="monto-resumen"
           id="monto-resumen"
           role="status"
           aria-live="polite"
           aria-atomic="true"
           aria-label="Monto seleccionado: ninguno">
        <span class="monto-resumen-label" id="lbl-monto-sel" aria-hidden="true">
          Monto seleccionado
        </span>
        <span class="monto-resumen-valor" id="monto-resumen-val" aria-hidden="true">
          Bs. 0.00
        </span>
      </div>

      <!-- Mensaje error -->
      <div class="op-msg error"
           id="op-msg"
           role="alert"
           aria-live="assertive"
           aria-atomic="true">
        <span aria-hidden="true">●</span>
        <span id="msg-text"></span>
      </div>

      <!-- Botón confirmar -->
      <button class="btn-confirm"
              id="btn-confirmar"
              disabled
              aria-label="Continuar con el depósito"
              aria-disabled="true"
              onclick="confirmar()">
        <span id="btn-text">Continuar</span>
      </button>

    </div>
  </div>

  <div class="bottom-bar" role="presentation" aria-hidden="true"></div>

  <script src="assets/js/voz.js"></script>
  <script>
    const t       = JSON.parse(sessionStorage.getItem('translations') || '{}');
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (!usuario.id) window.location.href = 'index.html';

    // Aplicar idioma
    document.getElementById('titulo-pagina').textContent  = t.deposito_titulo      || 'Depósito';
    document.getElementById('sub-pagina').textContent     = t.seleccione_monto_sub || 'Seleccione el monto';
    document.getElementById('lbl-montos').textContent     = t.montos_disponibles   || 'Montos disponibles';
    document.getElementById('lbl-otro').textContent       = t.ingrese_monto_lbl    || 'Ingrese el monto (Bs.)';
    document.getElementById('lbl-monto-sel').textContent  = t.monto_seleccionado   || 'Monto seleccionado';
    document.getElementById('btn-text').textContent       = t.continuar_btn2       || 'Continuar';
    document.getElementById('btn-otro-monto').innerHTML   = '✎ &nbsp;' + (t.otro_monto_btn || 'Otro monto');

    let montoElegido = 0;
    let otroVisible  = false;

    // ── MONTO PREDEFINIDO ────────────────────────────────────
    function elegirMonto(m, el) {
      montoElegido = m;

      document.querySelectorAll('.monto-btn:not(.otro)').forEach(b => {
        b.classList.remove('selected');
        b.setAttribute('aria-pressed', 'false');
      });

      if (el) {
        el.classList.add('selected');
        el.setAttribute('aria-pressed', 'true');
      }

      const custom = document.getElementById('monto-custom');
      custom.classList.remove('visible');
      custom.setAttribute('aria-hidden', 'true');
      document.getElementById('monto-input').value = '';
      document.getElementById('btn-otro-monto').setAttribute('aria-expanded', 'false');
      otroVisible = false;

      actualizarResumen();
      Voz.hablar(`${t.monto_seleccionado || 'Monto seleccionado'}: ${m} bolivianos.`);
    }

    // ── MONTO PERSONALIZADO ──────────────────────────────────
    function toggleOtroMonto() {
      otroVisible = !otroVisible;

      const custom  = document.getElementById('monto-custom');
      const btnOtro = document.getElementById('btn-otro-monto');

      custom.classList.toggle('visible', otroVisible);
      custom.setAttribute('aria-hidden', String(!otroVisible));
      btnOtro.setAttribute('aria-expanded', String(otroVisible));

      document.querySelectorAll('.monto-btn:not(.otro)').forEach(b => {
        b.classList.remove('selected');
        b.setAttribute('aria-pressed', 'false');
      });

      if (otroVisible) {
        montoElegido = 0;
        actualizarResumen();
        document.getElementById('monto-input').focus();
        Voz.hablar(t.ingrese_monto_lbl || 'Ingrese el monto en bolivianos que desea depositar.');
      }
    }

    function actualizarDesdeInput() {
      const val = parseFloat(document.getElementById('monto-input').value);
      montoElegido = isNaN(val) ? 0 : val;
      actualizarResumen();
    }

    // ── RESUMEN ──────────────────────────────────────────────
    function actualizarResumen() {
      const resumen = document.getElementById('monto-resumen');
      const valEl   = document.getElementById('monto-resumen-val');
      const btn     = document.getElementById('btn-confirmar');

      if (montoElegido > 0) {
        resumen.classList.add('visible');
        valEl.textContent = 'Bs. ' + montoElegido.toFixed(2);
        resumen.setAttribute(
          'aria-label',
          `${t.monto_seleccionado || 'Monto seleccionado'}: ${montoElegido.toFixed(2)} bolivianos`
        );
        btn.disabled = false;
        btn.removeAttribute('aria-disabled');
        btn.setAttribute('aria-label', `Continuar con el depósito de ${montoElegido.toFixed(2)} bolivianos`);
      } else {
        resumen.classList.remove('visible');
        resumen.setAttribute('aria-label', `${t.monto_seleccionado || 'Monto seleccionado'}: ninguno`);
        btn.disabled = true;
        btn.setAttribute('aria-disabled', 'true');
        btn.setAttribute('aria-label', 'Continuar con el depósito');
      }
    }

    // ── CONFIRMAR ────────────────────────────────────────────
    function confirmar() {
      if (montoElegido <= 0) return;
      sessionStorage.setItem('op_tipo',  'deposito');
      sessionStorage.setItem('op_monto', montoElegido);
      Voz.detenerHabla();
      salir('cuenta.html');
    }

    function volver() { salir('menu.html'); }

    function salir(dest) {
      document.querySelector('.op-wrapper').style.transition = 'opacity 0.2s ease';
      document.querySelector('.op-wrapper').style.opacity    = '0';
      setTimeout(() => window.location.href = dest, 200);
    }

    // ── VOZ ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
      Voz.iniciarVozPagina(
        t.deposito_titulo      || 'Depósito de dinero.',
        t.seleccione_monto_sub || 'Seleccione el monto que desea depositar o ingrese uno personalizado.'
      );
    });
  </script>
</body>
</html>

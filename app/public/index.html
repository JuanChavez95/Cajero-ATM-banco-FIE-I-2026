<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Fie — Cajero ATM</title>
  <link rel="stylesheet" href="assets/css/welcome.css">
</head>
<body>

<div class="fie-root" id="welcome-screen">

  <div class="top-bar"></div>

  <!-- LOGO -->
  <div class="logo-area">
    <svg class="logo-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="24" fill="#0a0a0a" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <path d="M20 16 C12 20, 12 36, 20 40" stroke="#e70075" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M28 20 C38 24, 38 32, 28 36" stroke="#0094d6" stroke-width="4" stroke-linecap="round" fill="none"/>
      <circle cx="24" cy="28" r="3" fill="#e70075"/>
    </svg>
    <div class="logo-text">
      <span class="banco">Banco</span><span class="fie">Fie</span>
    </div>
  </div>

  <div class="tagline">Sé parte de la comunidad Fie</div>

  <!-- TARJETA ANIMADA -->
  <div class="card-area">
    <div class="atm-card-visual">
      <div class="card-stripe"></div>
      <div class="card-chip"></div>
      <div class="card-logo">
        <span class="b">Banco</span><span class="f">Fie</span>
      </div>
      <div class="card-number">•••• •••• •••• ••••</div>
      <div class="card-name">Titular de cuenta</div>
      <div class="card-exp">12/29</div>
      <div class="card-shine"></div>
    </div>

    <!-- Flecha animada de inserción -->
    <div class="insert-arrow">
      <div class="arrow-line"></div>
      <div class="arrow-head"></div>
    </div>
  </div>

  <!-- INSTRUCCIONES -->
  <div class="instructions">
    <div class="inst-line">
      <div class="inst-dot"></div>
      Inserte su tarjeta para comenzar
    </div>
    <div class="inst-line" style="opacity:0.45; font-size:0.72rem; letter-spacing:1px; text-transform:none;">
      Introduzca la tarjeta con el chip hacia arriba
    </div>
  </div>

  <div class="divider"></div>

  <!-- 24H -->
  <div class="available-text">
    Cajero <span>ATM</span> disponible<br>las <span>24 horas</span> del día
  </div>

  <div class="enter-hint">Presione Enter o toque para continuar</div>

</div><!-- /fie-root -->

<script>
  // Clic o Enter → avanza a selección de idioma
  document.getElementById('welcome-screen').addEventListener('click', irAIdiomas);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') irAIdiomas();
  });

  function irAIdiomas() {
    window.location.href = 'language.html';
  }
</script>

</body>
</html>

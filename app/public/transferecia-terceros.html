<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Fie — Transferencia a Terceros</title>
  <link rel="stylesheet" href="assets/css/operaciones.css">
  <style>
    .op-header-icon     { background: rgba(160,90,255,0.12); }
    .op-header-icon svg { stroke: #a05aff; }
    .op-card::before    { background: linear-gradient(90deg, #a05aff, #7a3fd6); }
    .monto-btn:hover    { border-color: rgba(160,90,255,0.5); color: #a05aff; }
    .monto-btn.selected { background: rgba(160,90,255,0.12); border-color: #a05aff; color: #a05aff; }
    .monto-btn.otro:hover { border-color: rgba(160,90,255,0.4); color: #a05aff; }
    .monto-resumen-valor { color: #a05aff; }
    .btn-confirm { background: linear-gradient(135deg, #a05aff, #7a3fd6); box-shadow: 0 6px 18px rgba(160,90,255,0.3); }
    .btn-confirm:not(:disabled):hover { box-shadow: 0 10px 24px rgba(160,90,255,0.4); }

    .paso-indicator { width:100%; display:flex; align-items:center; margin-bottom:24px; animation:fadeDown 0.4s ease both; }
    .paso-step { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .paso-circle { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:800; color:rgba(255,255,255,0.2); transition:all 0.3s; }
    .paso-circle.active { border-color:#a05aff; color:#a05aff; background:rgba(160,90,255,0.1); }
    .paso-circle.done   { border-color:#0094d6; background:#0094d6; color:white; }
    .paso-label { font-size:0.52rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.15); text-align:center; transition:color 0.3s; }
    .paso-step.active .paso-label { color:#a05aff; }
    .paso-step.done   .paso-label { color:#0094d6; }
    .paso-line { height:2px; width:36px; background:rgba(255,255,255,0.07); margin-bottom:18px; transition:background 0.3s; flex-shrink:0; }
    .paso-line.done { background:#0094d6; }

    /* Campo número de cuenta destino */
    .destino-card {
      width:100%; background:#1a1a1a; border:1.5px solid rgba(255,255,255,0.07);
      border-radius:14px; padding:20px 18px;
      display:flex; flex-direction:column; gap:10px;
    }
    .destino-label { font-size:0.62rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.25); }
    .destino-input-wrap { display:flex; align-items:center; background:#111; border:1.5px solid rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; transition:border-color 0.2s; }
    .destino-input-wrap:focus-within { border-color:rgba(160,90,255,0.5); }
    .destino-input {
      flex:1; background:transparent; border:none; outline:none;
      padding:14px 16px; font-family:'Montserrat',sans-serif;
      font-size:1rem; font-weight:800; color:#fff;
      letter-spacing:3px;
    }
    .destino-input::placeholder { color:rgba(255,255,255,0.12); letter-spacing:1px; font-size:0.85rem; }

    /* Badge destinatario verificado */
    .destinatario-badge {
      display:none; align-items:center; gap:12px;
      background:#1a1a1a; border:1.5px solid rgba(160,90,255,0.3);
      border-radius:12px; padding:14px 16px;
    }
    .destinatario-badge.visible { display:flex; }
    .destinatario-avatar {
      width:40px; height:40px; border-radius:50%;
      background:rgba(160,90,255,0.12); border:2px solid rgba(160,90,255,0.25);
      display:flex; align-items:center; justify-content:center;
      font-size:0.75rem; font-weight:800; color:#a05aff;
    }
    .destinatario-nombre { font-size:0.85rem; font-weight:800; color:rgba(255,255,255,0.85); }
    .destinatario-cuenta { font-size:0.6rem; font-weight:600; color:rgba(255,255,255,0.2); letter-spacing:2px; margin-top:2px; }
    .check-verde { margin-left:auto; color:#00c853; font-size:1.1rem; }

    /* Cuenta origen badge */
    .cuenta-badge { display:flex; align-items:center; gap:12px; background:#1a1a1a; border:1.5px solid rgba(160,90,255,0.25); border-radius:12px; padding:14px 16px; margin-bottom:4px; }
    .cuenta-badge-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:rgba(160,90,255,0.12); }
    .cuenta-badge-icon svg { width:16px; height:16px; stroke:#a05aff; }
    .cuenta-badge-info { flex:1; }
    .cuenta-badge-tipo  { font-size:0.78rem; font-weight:800; color:rgba(255,255,255,0.75); }
    .cuenta-badge-saldo { font-size:0.62rem; font-weight:600; color:rgba(255,255,255,0.2); margin-top:2px; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="op-wrapper">

    <!-- Header -->
    <div class="op-header">
      <button class="btn-back" onclick="retroceder()">←</button>
      <div class="op-header-info">
        <div class="op-header-title">Transferencia a terceros</div>
        <div class="op-header-sub" id="sub-paso">Cuenta origen</div>
      </div>
      <div class="op-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
    </div>

    <!-- Indicador de pasos -->
    <div class="paso-indicator">
      <div class="paso-step active" id="ps1"><div class="paso-circle active" id="pc1">1</div><div class="paso-label">Origen</div></div>
      <div class="paso-line" id="pl1"></div>
      <div class="paso-step" id="ps2"><div class="paso-circle" id="pc2">2</div><div class="paso-label">Destino</div></div>
      <div class="paso-line" id="pl2"></div>
      <div class="paso-step" id="ps3"><div class="paso-circle" id="pc3">3</div><div class="paso-label">Monto</div></div>
      <div class="paso-line" id="pl3"></div>
      <div class="paso-step" id="ps4"><div class="paso-circle" id="pc4">4</div><div class="paso-label">Confirmar</div></div>
    </div>

    <!-- PASO 1: Cuenta origen -->
    <div id="paso1" style="width:100%;">
      <div class="section-label" style="margin-bottom:12px;">Seleccione su cuenta origen</div>
      <div id="lista-origen" style="display:flex; flex-direction:column; gap:10px;">
        <div class="op-msg info visible"><span class="spinner"></span><span>Cargando cuentas...</span></div>
      </div>
      <div class="op-msg error" id="err1" style="margin-top:12px;"><span>●</span><span id="err1-text"></span></div>
    </div>

    <!-- PASO 2: Cuenta destino (número manual) -->
    <div id="paso2" style="width:100%; display:none;">
      <div class="cuenta-badge" id="badge-origen">
        <div class="cuenta-badge-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="cuenta-badge-info">
          <div class="cuenta-badge-tipo" id="badge-origen-tipo">—</div>
          <div class="cuenta-badge-saldo" id="badge-origen-saldo">—</div>
        </div>
      </div>

      <div class="section-label" style="margin:16px 0 12px;">Ingrese el número de cuenta destino</div>

      <div class="destino-card">
        <div class="destino-label">Número de cuenta (12 dígitos)</div>
        <div class="destino-input-wrap">
          <input type="text" class="destino-input" id="input-num-destino"
            maxlength="12" placeholder="000000000000" inputmode="numeric"
            oninput="this.value=this.value.replace(/\D/g,''); limpiarVerificacion()">
        </div>
      </div>

      <!-- Badge destinatario verificado -->
      <div class="destinatario-badge" id="badge-destinatario" style="margin-top:12px;">
        <div class="destinatario-avatar" id="dest-avatar">??</div>
        <div>
          <div class="destinatario-nombre" id="dest-nombre">—</div>
          <div class="destinatario-cuenta" id="dest-cuenta">—</div>
        </div>
        <div class="check-verde">✓</div>
      </div>

      <div class="op-msg error" id="err2" style="margin-top:12px;"><span>●</span><span id="err2-text"></span></div>

      <div style="display:flex; gap:10px; margin-top:16px;">
        <button class="btn-confirm" style="flex:1;" onclick="verificarCuentaDestino()" id="btn-verificar">
          <span id="btn-verificar-text">Verificar cuenta</span>
        </button>
      </div>
      <button class="btn-confirm" style="margin-top:10px; display:none;" id="btn-continuar-dest" onclick="irPasoUI(3)">
        Continuar →
      </button>
    </div>

    <!-- PASO 3: Monto -->
    <div id="paso3" style="width:100%; display:none;">
      <div class="cuenta-badge" style="margin-bottom:8px;">
        <div class="cuenta-badge-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </div>
        <div class="cuenta-badge-info">
          <div class="cuenta-badge-tipo" id="badge-dest-nombre-3">—</div>
          <div class="cuenta-badge-saldo" id="badge-dest-cuenta-3">—</div>
        </div>
      </div>
      <div class="op-card" style="margin-top:8px;">
        <div>
          <div class="section-label">Seleccione el monto</div>
          <div class="montos-grid">
            <button class="monto-btn" onclick="elegirMonto(10)"><span>10</span><span class="currency">Bs.</span></button>
            <button class="monto-btn" onclick="elegirMonto(20)"><span>20</span><span class="currency">Bs.</span></button>
            <button class="monto-btn" onclick="elegirMonto(50)"><span>50</span><span class="currency">Bs.</span></button>
            <button class="monto-btn" onclick="elegirMonto(100)"><span>100</span><span class="currency">Bs.</span></button>
            <button class="monto-btn" onclick="elegirMonto(200)"><span>200</span><span class="currency">Bs.</span></button>
            <button class="monto-btn" onclick="elegirMonto(500)"><span>500</span><span class="currency">Bs.</span></button>
            <button class="monto-btn otro" onclick="toggleOtro()">✎ &nbsp; Otro monto</button>
          </div>
        </div>
        <div class="monto-custom" id="monto-custom">
          <label>Ingrese el monto (Bs.)</label>
          <div class="monto-input-wrap">
            <span class="monto-prefix">Bs.</span>
            <input type="number" class="monto-input" id="monto-input" min="1" step="0.01" placeholder="0.00" oninput="actualizarDesdeInput()">
          </div>
        </div>
        <div class="op-divider"></div>
        <div class="monto-resumen" id="monto-resumen">
          <span class="monto-resumen-label">Monto a transferir</span>
          <span class="monto-resumen-valor" id="monto-resumen-val">Bs. 0.00</span>
        </div>
        <div class="op-msg error" id="err3"><span>●</span><span id="err3-text"></span></div>
        <button class="btn-confirm" id="btn-paso3" disabled onclick="irPaso4()">Continuar</button>
      </div>
    </div>

    <!-- PASO 4: Confirmación -->
    <div id="paso4" style="width:100%; display:none;">
      <div class="op-card">
        <div class="section-label">Confirme la transferencia</div>
        <div class="resultado-detalle" id="resumen-final" style="margin-top:4px;"></div>
        <div class="op-divider"></div>
        <div class="op-msg error" id="err4"><span>●</span><span id="err4-text"></span></div>
        <button class="btn-confirm" id="btn-confirmar-tf" onclick="confirmarTransferencia()">Confirmar transferencia</button>
        <button class="btn-otra-op no" style="margin-top:8px;" onclick="irPasoUI(3)">← Modificar monto</button>
      </div>
    </div>

  </div>
  <div class="bottom-bar"></div>

  <script>
    const API     = '/app/api';
    const t       = JSON.parse(sessionStorage.getItem('translations') || '{}');
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (!usuario.id) window.location.href = 'index.html';

    let cuentas           = [];
    let origenId          = null;
    let origenTipo        = '';
    let origenSaldo       = 0;
    let destinoVerificado = false;
    let destinoNombre     = '';
    let numeroCuentaDest  = '';
    let montoElegido      = 0;
    let otroVisible       = false;

    const labelCuenta = {
      ahorros:   t.cuenta_ahorros   || 'Cta. Ahorros',
      corriente: t.cuenta_corriente || 'Cta. Corriente'
    };

    // ── Cargar cuentas propias ────────────────────────────────
    async function cargarCuentas() {
      try {
        const res  = await fetch(`${API}/balance.php`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        cuentas = data.cuentas || [];
        if (!cuentas.length) {
          document.getElementById('lista-origen').innerHTML =
            '<div class="op-msg info visible"><span>No tiene cuentas activas</span></div>';
          return;
        }
        document.getElementById('lista-origen').innerHTML = cuentas.map(c => {
          const col = c.tipo === 'ahorros' ? '#0094d6' : '#ffa500';
          return `<button class="cuenta-item ${c.tipo}" onclick="elegirOrigen(${c.id})">
            <div class="cuenta-icon" style="background:${col}18;">
              <svg viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                ${c.tipo === 'ahorros' ? '<rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3"/>' : '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'}
              </svg>
            </div>
            <div class="cuenta-info">
              <div class="cuenta-tipo">${labelCuenta[c.tipo]}</div>
              <div class="cuenta-num">**** **** ${c.numero_cuenta.slice(-4)}</div>
            </div>
            <div class="cuenta-saldo">
              <div class="cuenta-saldo-monto">Bs. ${parseFloat(c.saldo).toFixed(2)}</div>
              <div class="cuenta-saldo-label">${t.saldo_disponible || 'Disponible'}</div>
            </div>
            <div class="cuenta-arrow">›</div>
          </button>`;
        }).join('');
      } catch (err) {
        document.getElementById('err1-text').textContent = err.message;
        document.getElementById('err1').classList.add('visible');
      }
    }

    function elegirOrigen(id) {
      const c = cuentas.find(x => x.id === id);
      origenId    = c.id;
      origenTipo  = c.tipo;
      origenSaldo = parseFloat(c.saldo);
      document.getElementById('badge-origen-tipo').textContent  = labelCuenta[c.tipo] + ' — **** ' + c.numero_cuenta.slice(-4);
      document.getElementById('badge-origen-saldo').textContent = 'Saldo disponible: Bs. ' + origenSaldo.toFixed(2);
      irPasoUI(2);
    }

    // ── Verificar cuenta destino ──────────────────────────────
    function limpiarVerificacion() {
      destinoVerificado = false;
      document.getElementById('badge-destinatario').classList.remove('visible');
      document.getElementById('btn-continuar-dest').style.display = 'none';
      document.getElementById('err2').classList.remove('visible');
    }

    async function verificarCuentaDestino() {
      const num = document.getElementById('input-num-destino').value.trim();
      if (num.length !== 12) {
        document.getElementById('err2-text').textContent = 'El número de cuenta debe tener 12 dígitos';
        document.getElementById('err2').classList.add('visible');
        return;
      }

      const btn = document.getElementById('btn-verificar');
      document.getElementById('btn-verificar-text').innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;

      try {
        // Usamos balance para verificar — creamos endpoint de búsqueda
        const res  = await fetch(`${API}/buscar_cuenta.php?numero=${num}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Cuenta no encontrada');

        numeroCuentaDest = num;
        destinoNombre    = data.nombre;
        destinoVerificado = true;

        // Mostrar badge del destinatario
        const iniciales = data.nombre.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        document.getElementById('dest-avatar').textContent  = iniciales;
        document.getElementById('dest-nombre').textContent  = data.nombre;
        document.getElementById('dest-cuenta').textContent  = '**** **** ' + num.slice(-4) + ' — ' + (labelCuenta[data.tipo] || data.tipo);
        document.getElementById('badge-destinatario').classList.add('visible');
        document.getElementById('err2').classList.remove('visible');
        document.getElementById('btn-continuar-dest').style.display = 'block';

        // Actualizar paso 3
        document.getElementById('badge-dest-nombre-3').textContent = data.nombre;
        document.getElementById('badge-dest-cuenta-3').textContent = 'Cuenta **** ' + num.slice(-4);

      } catch (err) {
        document.getElementById('err2-text').textContent = err.message;
        document.getElementById('err2').classList.add('visible');
        destinoVerificado = false;
      } finally {
        document.getElementById('btn-verificar-text').textContent = 'Verificar cuenta';
        btn.disabled = false;
      }
    }

    // ── Monto ─────────────────────────────────────────────────
    function elegirMonto(m) {
      montoElegido = m;
      document.querySelectorAll('.monto-btn:not(.otro)').forEach(b => b.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('monto-custom').classList.remove('visible');
      document.getElementById('monto-input').value = '';
      otroVisible = false;
      actualizarResumen();
    }

    function toggleOtro() {
      otroVisible = !otroVisible;
      document.getElementById('monto-custom').classList.toggle('visible', otroVisible);
      document.querySelectorAll('.monto-btn:not(.otro)').forEach(b => b.classList.remove('selected'));
      if (otroVisible) { montoElegido = 0; actualizarResumen(); document.getElementById('monto-input').focus(); }
    }

    function actualizarDesdeInput() {
      const v = parseFloat(document.getElementById('monto-input').value);
      montoElegido = isNaN(v) ? 0 : v;
      actualizarResumen();
    }

    function actualizarResumen() {
      const resumen = document.getElementById('monto-resumen');
      const btn     = document.getElementById('btn-paso3');
      if (montoElegido > 0) {
        resumen.classList.add('visible');
        document.getElementById('monto-resumen-val').textContent = 'Bs. ' + montoElegido.toFixed(2);
        btn.disabled = false;
      } else {
        resumen.classList.remove('visible');
        btn.disabled = true;
      }
    }

    function irPaso4() {
      if (montoElegido <= 0) return;
      if (montoElegido > origenSaldo) {
        document.getElementById('err3-text').textContent = t.saldo_insuficiente || 'Saldo insuficiente';
        document.getElementById('err3').classList.add('visible');
        return;
      }
      document.getElementById('err3').classList.remove('visible');
      const cOrigen = cuentas.find(x => x.id === origenId);
      document.getElementById('resumen-final').innerHTML = `
        <div class="detalle-row"><span class="detalle-key">Desde</span><span class="detalle-val">${labelCuenta[origenTipo]} **** ${cOrigen.numero_cuenta.slice(-4)}</span></div>
        <div class="detalle-row"><span class="detalle-key">Para</span><span class="detalle-val">${destinoNombre}</span></div>
        <div class="detalle-row"><span class="detalle-key">Cuenta destino</span><span class="detalle-val">**** **** ${numeroCuentaDest.slice(-4)}</span></div>
        <div class="detalle-row"><span class="detalle-key">Monto</span><span class="detalle-val highlight">Bs. ${montoElegido.toFixed(2)}</span></div>
        <div class="detalle-row"><span class="detalle-key">Saldo tras operación</span><span class="detalle-val" style="color:#e70075;">Bs. ${(origenSaldo - montoElegido).toFixed(2)}</span></div>
        <div class="detalle-row"><span class="detalle-key">Fecha</span><span class="detalle-val">${new Date().toLocaleString('es-BO')}</span></div>`;
      irPasoUI(4);
    }

    async function confirmarTransferencia() {
      const btn = document.getElementById('btn-confirmar-tf');
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled  = true;
      try {
        const res  = await fetch(`${API}/transfer_terceros.php`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            cuenta_origen_id:      origenId,
            numero_cuenta_destino: numeroCuentaDest,
            monto:                 montoElegido
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error');
        sessionStorage.setItem('op_resultado', JSON.stringify({
          tipo:        'transferencia',
          monto:       montoElegido,
          cuenta_tipo: origenTipo,
          nuevo_saldo: data.nuevo_saldo_origen,
          mensaje:     data.mensaje + ' a ' + data.destinatario
        }));
        salir('resultado.html');
      } catch (err) {
        document.getElementById('err4-text').textContent = err.message;
        document.getElementById('err4').classList.add('visible');
        btn.textContent = 'Confirmar transferencia';
        btn.disabled    = false;
      }
    }

    // ── Navegación de pasos ───────────────────────────────────
    function irPasoUI(n) {
      [1,2,3,4].forEach(i => {
        document.getElementById(`paso${i}`).style.display = i === n ? 'block' : 'none';
        const ps = document.getElementById(`ps${i}`);
        const pc = document.getElementById(`pc${i}`);
        ps.className = 'paso-step' + (i === n ? ' active' : i < n ? ' done' : '');
        pc.className = 'paso-circle' + (i === n ? ' active' : i < n ? ' done' : '');
        pc.innerHTML = pc.classList.contains('done') ? '✓' : i;
        if (i < 4) document.getElementById(`pl${i}`).className = 'paso-line' + (i < n ? ' done' : '');
      });
      const subs = ['Cuenta origen','Cuenta destino','Seleccione monto','Confirmar operación'];
      document.getElementById('sub-paso').textContent = subs[n-1];
    }

    function retroceder() {
      const pasoActual = [1,2,3,4].find(i => document.getElementById(`paso${i}`).style.display !== 'none') || 1;
      if (pasoActual === 1) salir('menu.html');
      else irPasoUI(pasoActual - 1);
    }

    function salir(dest) {
      document.querySelector('.op-wrapper').style.transition = 'opacity 0.2s ease';
      document.querySelector('.op-wrapper').style.opacity    = '0';
      setTimeout(() => window.location.href = dest, 200);
    }

    cargarCuentas();
  </script>
</body>
</html>
